name: Deploy to GitHub Pages

# Publiceert de statische site naar GitHub Pages.
# Eenmalig instellen: repo Settings → Pages → Source: "GitHub Actions".
# Daarna deployt elke push naar main de site automatisch.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Slechts één deploy tegelijk; nieuwe pushes onderbreken een lopende run niet.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
